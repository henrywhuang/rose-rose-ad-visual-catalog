<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Q3 OKR 執行時間線</title>
<style>
:root{
  --bg:#0b1020;--card:#151b2e;--card2:#1b2338;--line:#2a3450;--txt:#e8ecf6;--sub:#96a0bd;
  --accent:#6366f1;
  --s0:#64748b;/* 未開始 */ --s1:#3b82f6;/* 進行中 */ --s2:#f59e0b;/* 暫停 */ --s3:#22c55e;/* 完成 */
  --warn:#facc15;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:linear-gradient(180deg,#0b1020,#0e1428);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  line-height:1.55;padding-bottom:70px}
.wrap{max-width:920px;margin:0 auto;padding:16px 13px}
a{color:var(--accent)}
header h1{font-size:20px;margin:0 0 3px}
header .meta{color:var(--sub);font-size:12.5px}
.banner{display:none;background:#3a2f0a;border:1px solid #6b5310;border-radius:12px;padding:10px 13px;
  font-size:12.5px;color:#f4e2a1;margin:12px 0}
.banner.show{display:block}
.banner b{color:var(--warn)}

/* Objectives */
.obj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin:12px 0}
.obj .otitle{font-size:14.5px;font-weight:800}
.obj .otitle .tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:700;
  border-radius:6px;padding:1px 7px;margin-right:7px;vertical-align:1px}
.obj ul{margin:9px 0 0;padding-left:0;list-style:none}
.obj li{font-size:12.8px;color:var(--txt);padding:4px 0 4px 0;border-top:1px dashed var(--line);display:flex;gap:8px}
.obj li:first-child{border-top:none}
.obj li .krtag{flex:0 0 auto;color:var(--accent);font-weight:700;font-size:11.5px;min-width:34px}
.obj li .krt{color:var(--sub)}

/* Dashboard */
.dash{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.dash .d{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.dash .d .n{font-size:20px;font-weight:800}
.dash .d .l{font-size:11px;color:var(--sub);margin-top:1px}
.dash .d.total .n{color:var(--txt)} .dash .d.s0 .n{color:var(--s0)} .dash .d.s1 .n{color:var(--s1)}
.dash .d.s2 .n{color:var(--s2)} .dash .d.s3 .n{color:var(--s3)}
.progress{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:6px}
.progress .top{display:flex;justify-content:space-between;font-size:12.5px;color:var(--sub);margin-bottom:7px}
.progress .top b{color:var(--s3);font-size:14px}
.bar{height:9px;background:#0e1428;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--s3),#4ade80);width:0;transition:width .4s}

/* Nav */
nav.tabs{position:sticky;top:0;z-index:9;display:flex;gap:7px;padding:9px 0;
  background:linear-gradient(180deg,#0b1020,#0b1020ee);overflow-x:auto}
nav.tabs button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--sub);
  border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600}
nav.tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Timeline */
.month{margin:14px 0}
.month>h2{font-size:16px;margin:0 0 4px;display:flex;align-items:center;gap:9px}
.month>h2 .mp{font-size:11.5px;color:var(--sub);font-weight:600}
.week{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 0;overflow:hidden}
.week>.wh{display:flex;justify-content:space-between;align-items:baseline;padding:9px 13px;
  background:var(--card2);border-bottom:1px solid var(--line)}
.week>.wh .wl{font-size:13.5px;font-weight:800}
.week>.wh .wr{font-size:11.5px;color:var(--sub)}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;font-size:12.5px;padding:9px 10px;border-top:1px solid var(--line);vertical-align:top}
th{color:var(--sub);font-weight:600;font-size:11px;background:#121830}
tr:first-child td{border-top:none}
.krcell{white-space:nowrap;color:var(--accent);font-weight:700;font-size:11.5px}
.mtype{display:inline-block;font-size:10.5px;font-weight:700;border-radius:5px;padding:1px 6px;white-space:nowrap}
.mtype.開始{background:#1e293b;color:#7dd3fc;border:1px solid #274156}
.mtype.推進{background:#1e2540;color:#a5b4fc;border:1px solid #313a63}
.mtype.完成{background:#0f2a1a;color:#86efac;border:1px solid #1f4d33}
.mtype.階段{background:#2a2410;color:#fcd34d;border:1px solid #4a3f14}
.tasktext{color:var(--txt)}
td.c-status{width:104px} td.c-note{width:180px}

/* Status select */
select.st{width:100%;appearance:none;border-radius:8px;padding:6px 8px;font-size:12px;font-weight:700;
  border:1px solid var(--line);color:#fff;background:#0e1428;background-image:none;text-align:center}
select.st[data-v="0"]{background:#334155;border-color:#475569}
select.st[data-v="1"]{background:#1d4ed8;border-color:#2563eb}
select.st[data-v="2"]{background:#b45309;border-color:#d97706}
select.st[data-v="3"]{background:#15803d;border-color:#16a34a}
textarea.note{width:100%;min-height:34px;resize:vertical;border-radius:8px;padding:6px 8px;font-size:12px;
  border:1px solid var(--line);background:#0e1428;color:var(--txt);font-family:inherit;line-height:1.4}
textarea.note::placeholder{color:#4b5674}

/* Toolbar */
.toolbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:#0c1226ee;border-top:1px solid var(--line);
  backdrop-filter:blur(6px);padding:8px 12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.toolbar button{border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:9px;
  padding:8px 12px;font-size:12.5px;font-weight:600}
.toolbar button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.toolbar .saved{font-size:11.5px;color:var(--sub);align-self:center}
.foot{color:var(--sub);font-size:11px;text-align:center;margin:18px 0 4px}
@media(max-width:560px){
  .dash{grid-template-columns:repeat(5,1fr);gap:5px} .dash .d .n{font-size:16px} .dash .d .l{font-size:9.5px}
  td.c-note{width:120px} td.c-status{width:88px} th,td{padding:8px 6px}
  .krcell{font-size:11px}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1 id="pgTitle">Q3 OKR 執行時間線</h1>
  <div class="meta" id="pgMeta"></div>
</header>

<div class="banner" id="sampleBanner">
  <b>⚠️ 目前是範例架構</b>，尚未帶入你的真實 Q3 OKR。把 O / KR 文字（或截圖）給我，我一鍵替換這段資料即可。
  下面所有互動（狀態回填、備注、自動存檔）都已可實際使用。
</div>

<div id="objectives"></div>

<div class="progress">
  <div class="top"><span>整體完成進度</span><span><b id="pctText">0%</b> · 加權（完成=1，進行中=0.5，暫停=0.25）</span></div>
  <div class="bar"><i id="barFill"></i></div>
</div>
<div class="dash" id="dash"></div>

<nav class="tabs" id="tabs"></nav>
<div id="timeline"></div>

<div class="foot" id="foot"></div>
</div>

<div class="toolbar">
  <span class="saved" id="savedTip">狀態自動存於本機瀏覽器</span>
  <button onclick="copySummary()">📋 複製文字摘要</button>
  <button onclick="exportState()">⬇️ 匯出備份</button>
  <button onclick="importState()">⬆️ 匯入</button>
  <button onclick="resetState()">♻️ 重置</button>
</div>
<input type="file" id="importFile" accept="application/json" style="display:none">

<script>
/* =========================================================================
   OKR DATA — 只需替換這一段（其餘引擎不用動）。
   status/note 不寫在這，由使用者在頁面回填、存進 localStorage。
   month.weeks[].tasks[].type ∈ 開始 / 推進 / 完成 / 階段
   ========================================================================= */
const OKR_DATA = {
  meta:{
    title:"黃威豪｜Q3 OKR 執行時間線",
    period:"2026 Q3 · 7 / 8 / 9 月（以週為單位）",
    updated:"2026-07-15",
    isSample:true            // true 時顯示黃色「範例」提示條
  },
  objectives:[
    { code:"O1", title:"（範例）穩定並擴大自有流量池體驗營進量",
      krs:[
        {code:"KR1", title:"閱讀池月均進量 87 → ≥ 100 人/期"},
        {code:"KR2", title:"建立渠道紅綠燈監控週報，覆蓋率 100%"},
        {code:"KR3", title:"英語池核心渠道（官方-Meta）佔比穩定 ≥ 40%"},
      ]},
    { code:"O2", title:"（範例）AI 素材產線把爆款廣告產出效率翻倍",
      krs:[
        {code:"KR4", title:"AI 素材產線 SOP 定版，單批出圖 ≤ 30 分"},
        {code:"KR5", title:"TW/EN/ES/JP 四語系各 ≥ 2 組爆款素材上架"},
        {code:"KR6", title:"素材 A/B 測試建立回饋閉環，勝出率 ≥ 30%"},
      ]},
  ],
  months:[
    { name:"7月", note:"打底 · 監控上線 · SOP 初版",
      weeks:[
        { code:"7W1", label:"W1", range:"7/1–7/6", tasks:[
          {id:"t7a", kr:"KR2", type:"開始", text:"盤點 9 條渠道口徑，定義紅綠燈閾值（平均±1σ）"},
          {id:"t7b", kr:"KR4", type:"開始", text:"整理現行 AI 出圖流程痛點，列 SOP 草綱"},
        ]},
        { code:"7W2", label:"W2", range:"7/7–7/13", tasks:[
          {id:"t7c", kr:"KR2", type:"推進", text:"產出第一版流量池渠道週報並回報行銷部"},
          {id:"t7d", kr:"KR5", type:"推進", text:"TW / EN 各出 1 組 P2 素材測試"},
        ]},
        { code:"7W3", label:"W3", range:"7/14–7/20", tasks:[
          {id:"t7e", kr:"KR1", type:"階段", text:"閱讀池月均達 ≥ 92 人/期（往 100 推進）"},
          {id:"t7f", kr:"KR4", type:"推進", text:"SOP 初版定稿，內部試跑一輪"},
        ]},
        { code:"7W4", label:"W4", range:"7/21–7/27", tasks:[
          {id:"t7g", kr:"KR3", type:"推進", text:"英語池官方-Meta 佔比監控，調整投放配比"},
          {id:"t7h", kr:"KR5", type:"完成", text:"ES / JP 各 1 組素材上架"},
        ]},
        { code:"7W5", label:"W5", range:"7/28–7/31", tasks:[
          {id:"t7i", kr:"KR2", type:"完成", text:"7 月渠道監控週報 4 週全數交付"},
        ]},
      ]},
    { name:"8月", note:"放大 · 產線提速 · A/B 閉環",
      weeks:[
        { code:"8W1", label:"W1", range:"8/1–8/3", tasks:[
          {id:"t8a", kr:"KR6", type:"開始", text:"建立素材 A/B 測試框架與勝出判定口徑"},
        ]},
        { code:"8W2", label:"W2", range:"8/4–8/10", tasks:[
          {id:"t8b", kr:"KR4", type:"完成", text:"AI 產線 SOP 定版，單批出圖壓到 ≤ 30 分"},
          {id:"t8c", kr:"KR5", type:"推進", text:"四語系各補第 2 組爆款素材"},
        ]},
        { code:"8W3", label:"W3", range:"8/11–8/17", tasks:[
          {id:"t8d", kr:"KR1", type:"階段", text:"閱讀池月均站上 ≥ 96 人/期"},
          {id:"t8e", kr:"KR6", type:"推進", text:"跑第一批 A/B，回收勝出率數據"},
        ]},
        { code:"8W4", label:"W4", range:"8/18–8/24", tasks:[
          {id:"t8f", kr:"KR3", type:"階段", text:"官方-Meta 佔比連續 2 週 ≥ 40%"},
        ]},
        { code:"8W5", label:"W5", range:"8/25–8/31", tasks:[
          {id:"t8g", kr:"KR5", type:"完成", text:"四語系各 ≥ 2 組爆款素材全數上架"},
        ]},
      ]},
    { name:"9月", note:"收斂 · 達標 · 復盤",
      weeks:[
        { code:"9W1", label:"W1", range:"9/1–9/7", tasks:[
          {id:"t9a", kr:"KR6", type:"推進", text:"迭代 A/B 第二批，勝出率往 ≥ 30% 收斂"},
        ]},
        { code:"9W2", label:"W2", range:"9/8–9/14", tasks:[
          {id:"t9b", kr:"KR1", type:"完成", text:"閱讀池月均達標 ≥ 100 人/期"},
        ]},
        { code:"9W3", label:"W3", range:"9/15–9/21", tasks:[
          {id:"t9c", kr:"KR6", type:"完成", text:"A/B 勝出率 ≥ 30%，回饋閉環固化為流程"},
          {id:"t9d", kr:"KR3", type:"完成", text:"官方-Meta 佔比穩定 ≥ 40% 達標"},
        ]},
        { code:"9W4", label:"W4", range:"9/22–9/28", tasks:[
          {id:"t9e", kr:"O1", type:"階段", text:"O1 全 KR 收尾核對，補齊缺口"},
        ]},
        { code:"9W5", label:"W5", range:"9/29–9/30", tasks:[
          {id:"t9f", kr:"O2", type:"完成", text:"Q3 OKR 復盤報告，計分並列 Q4 改善點"},
        ]},
      ]},
  ]
};
/* ===================== DATA 結束 ===================== */

const STATUS = ["未開始","進行中","暫停","完成"];
const WEIGHT = [0,0.5,0.25,1];
const LSKEY = "okr_state_v1";

let state = load();
function load(){ try{ return JSON.parse(localStorage.getItem(LSKEY))||{} }catch(e){ return {} } }
function save(){ localStorage.setItem(LSKEY, JSON.stringify(state)); flashSaved(); }
function get(id){ return state[id] || {s:0, note:""}; }
function setStatus(id,v){ const t=get(id); t.s=+v; state[id]=t; save(); refreshStats(); }
function setNote(id,v){ const t=get(id); t.note=v; state[id]=t; save(); }

// index tasks
const ALL_TASKS=[];
OKR_DATA.months.forEach(m=>m.weeks.forEach(w=>w.tasks.forEach(t=>ALL_TASKS.push(t))));

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- render header + objectives ---------- */
document.getElementById('pgTitle').textContent = OKR_DATA.meta.title;
document.getElementById('pgMeta').textContent = `${OKR_DATA.meta.period}　·　更新 ${OKR_DATA.meta.updated}`;
document.title = OKR_DATA.meta.title;
if(OKR_DATA.meta.isSample) document.getElementById('sampleBanner').classList.add('show');

document.getElementById('objectives').innerHTML = OKR_DATA.objectives.map(o=>`
  <div class="obj">
    <div class="otitle"><span class="tag">${esc(o.code)}</span>${esc(o.title)}</div>
    <ul>${o.krs.map(k=>`<li><span class="krtag">${esc(k.code)}</span><span class="krt">${esc(k.title)}</span></li>`).join('')}</ul>
  </div>`).join('');

/* ---------- tabs ---------- */
const tabsEl=document.getElementById('tabs');
const tabs=[{k:'all',n:'全部'},...OKR_DATA.months.map(m=>({k:m.name,n:m.name}))];
tabsEl.innerHTML=tabs.map((t,i)=>`<button data-k="${t.k}" class="${i===0?'on':''}">${t.n}</button>`).join('');
tabsEl.querySelectorAll('button').forEach(b=>b.onclick=()=>{
  tabsEl.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); filterMonth(b.dataset.k);
});
function filterMonth(k){
  document.querySelectorAll('.month').forEach(m=>{
    m.style.display=(k==='all'||m.dataset.name===k)?'block':'none';
  });
}

/* ---------- timeline ---------- */
document.getElementById('timeline').innerHTML = OKR_DATA.months.map(m=>`
  <div class="month" data-name="${esc(m.name)}">
    <h2>${esc(m.name)} <span class="mp">${esc(m.note||'')}</span></h2>
    ${m.weeks.map(w=>`
      <div class="week">
        <div class="wh"><span class="wl">${esc(w.label)}</span><span class="wr">${esc(w.range)}</span></div>
        <table>
          <tr><th>KR</th><th>類型</th><th>任務／里程碑</th><th>狀態</th><th>備注</th></tr>
          ${w.tasks.map(t=>`
            <tr>
              <td class="krcell">${esc(t.kr)}</td>
              <td><span class="mtype ${t.type}">${esc(t.type)}</span></td>
              <td class="tasktext">${esc(t.text)}</td>
              <td class="c-status">
                <select class="st" data-id="${t.id}" data-v="${get(t.id).s}" onchange="onStatus(this)">
                  ${STATUS.map((s,i)=>`<option value="${i}" ${get(t.id).s===i?'selected':''}>${s}</option>`).join('')}
                </select>
              </td>
              <td class="c-note">
                <textarea class="note" data-id="${t.id}" placeholder="備注…" oninput="onNote(this)">${esc(get(t.id).note)}</textarea>
              </td>
            </tr>`).join('')}
        </table>
      </div>`).join('')}
  </div>`).join('');

function onStatus(el){ el.setAttribute('data-v', el.value); setStatus(el.dataset.id, el.value); }
function onNote(el){ setNote(el.dataset.id, el.value); }

/* ---------- stats ---------- */
function refreshStats(){
  const cnt=[0,0,0,0];
  ALL_TASKS.forEach(t=>cnt[get(t.id).s]++);
  const total=ALL_TASKS.length;
  const score=ALL_TASKS.reduce((a,t)=>a+WEIGHT[get(t.id).s],0);
  const pct= total? Math.round(score/total*100):0;
  document.getElementById('dash').innerHTML=`
    <div class="d total"><div class="n">${total}</div><div class="l">總任務</div></div>
    <div class="d s0"><div class="n">${cnt[0]}</div><div class="l">未開始</div></div>
    <div class="d s1"><div class="n">${cnt[1]}</div><div class="l">進行中</div></div>
    <div class="d s2"><div class="n">${cnt[2]}</div><div class="l">暫停</div></div>
    <div class="d s3"><div class="n">${cnt[3]}</div><div class="l">完成</div></div>`;
  document.getElementById('pctText').textContent=pct+'%';
  document.getElementById('barFill').style.width=pct+'%';
  document.getElementById('foot').textContent=
    `共 ${OKR_DATA.months.length} 個月 · ${ALL_TASKS.length} 項任務／里程碑　|　狀態存於本機，換裝置請用「匯出備份」帶走。`;
}
refreshStats();

/* ---------- toolbar actions ---------- */
let saveTimer;
function flashSaved(){
  const tip=document.getElementById('savedTip');
  tip.textContent='✓ 已儲存'; tip.style.color='var(--s3)';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{tip.textContent='狀態自動存於本機瀏覽器';tip.style.color='';},1200);
}
function copySummary(){
  let out=`${OKR_DATA.meta.title}\n${OKR_DATA.meta.period} · 更新 ${OKR_DATA.meta.updated}\n`;
  const score=ALL_TASKS.reduce((a,t)=>a+WEIGHT[get(t.id).s],0);
  out+=`整體完成 ${ALL_TASKS.length?Math.round(score/ALL_TASKS.length*100):0}%\n`;
  OKR_DATA.months.forEach(m=>{
    out+=`\n【${m.name}】${m.note||''}\n`;
    m.weeks.forEach(w=>w.tasks.forEach(t=>{
      const st=get(t.id);
      out+=`  ${w.label} ${w.range} [${t.kr}·${t.type}] ${STATUS[st.s]} — ${t.text}${st.note?`（備注：${st.note}）`:''}\n`;
    }));
  });
  navigator.clipboard.writeText(out).then(()=>alert('已複製文字摘要，可貼到 Lark / 訊息。')).catch(()=>{
    prompt('手動複製：',out);
  });
}
function exportState(){
  const blob=new Blob([JSON.stringify({meta:OKR_DATA.meta,state},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='okr_state_backup.json'; a.click();
}
function importState(){ document.getElementById('importFile').click(); }
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const j=JSON.parse(r.result); state=j.state||j; save(); location.reload(); }
    catch(err){ alert('匯入失敗：檔案格式不對'); } };
  r.readAsText(f);
};
function resetState(){
  if(confirm('確定清空所有狀態與備注？（可先「匯出備份」）')){ state={}; save(); location.reload(); }
}
</script>
</body>
</html>
