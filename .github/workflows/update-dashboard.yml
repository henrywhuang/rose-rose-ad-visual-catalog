name: Update traffic dashboard

# 台北時間每週三、週五 09:00 自動更新（= UTC 週三/五 01:00）
on:
  schedule:
    - cron: '0 1 * * 3,5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build dashboard from Lark
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          ARKIO_TOKEN: ${{ secrets.ARKIO_TOKEN }}
        run: node marketing/build.mjs
      - name: Commit if changed
        run: |
          git config user.name "rose-rose-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/index.html marketing/data.json
          if git diff --cached --quiet; then
            echo "No data change."
          else
            git commit -m "chore: auto-update traffic dashboard ($(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') TPE)"
            git push
          fi
