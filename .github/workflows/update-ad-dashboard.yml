name: Update ad dashboard

# 台北時間每天 09:00 自動更新（= UTC 每天 01:00）
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-ad-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build ad dashboard from Arkio
        env:
          ARKIO_TOKEN: ${{ secrets.ARKIO_TOKEN }}
        run: node ad/build.mjs
      - name: Commit if changed
        run: |
          git config user.name "rose-rose-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ad/index.html ad/data.json ad/ledger.json
          if git diff --cached --quiet; then
            echo "No data change."
          else
            git commit -m "chore: auto-update ad dashboard ($(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M') TPE)"
            git push
          fi
