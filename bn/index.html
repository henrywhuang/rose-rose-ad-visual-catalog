<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>兒童課程 Banner ｜ Rose Rose</title>
<style>
  :root{ --bg:#f7f3ee; --ink:#221f1b; --muted:#746b61; --line:#e3d9cc; --panel:#fffdf9; --accent:#b64f2a; --shadow:0 12px 34px rgba(47,35,25,.12);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:22px clamp(14px,4vw,28px) 60px;}
  header h1{font-size:clamp(22px,5.5vw,30px);margin:.2em 0 .1em;}
  header p{color:var(--muted);margin:.2em 0 0;line-height:1.6;font-size:15px;}
  .bar{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 8px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:999px;border:1px solid var(--line);
       background:var(--panel);color:var(--ink);text-decoration:none;font-weight:600;font-size:15px;}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .tip{color:var(--muted);font-size:13px;margin:6px 0 20px;line-height:1.6;}
  .grid{display:grid;grid-template-columns:1fr;gap:20px;}
  .card{margin:0;background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
  .shot{display:block;background:#eee;}
  .shot img{display:block;width:100%;height:auto;}
  figcaption{padding:14px 16px 16px;display:flex;flex-direction:column;gap:4px;}
  figcaption b{font-size:16px;}
  figcaption span{color:var(--muted);font-size:13px;}
  .dl{margin-top:10px;align-self:flex-start;display:inline-flex;align-items:center;gap:6px;
      padding:9px 16px;border-radius:999px;background:var(--accent);color:#fff;text-decoration:none;font-weight:700;font-size:14px;}
  footer{margin-top:34px;color:var(--muted);font-size:13px;line-height:1.7;border-top:1px solid var(--line);padding-top:16px;}
  footer a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>兒童課程 Banner</h1>
    <p>1030×450 招生橫幅。點圖看大圖、按「下載 PNG」存檔；或一鍵下載全部 ZIP。手機若沒觸發下載，<b>長按圖片 → 儲存影像</b>即可。</p>
  </header>
  <div class="bar">
    <a class="btn primary" href="../download/Rose_Rose_kids_banner.zip" download>⬇ 下載全部（ZIP）</a>
    <a class="btn" href="../">← 回視覺目錄</a>
  </div>
  <p class="tip">產自 bn_kit 模板（文案/配色/主視覺可換、風格一致）。更新方式：<code>node bn_kit/publish.mjs --push</code></p>
  <div class="grid">
      <figure class="card">
        <a class="shot" href="img/bn-01-literacy-camp.png" target="_blank" rel="noreferrer">
          <img src="img/bn-01-literacy-camp.png" alt="不補習也能學識字 · 5日共讀夏令營" loading="lazy">
        </a>
        <figcaption>
          <b>不補習也能學識字 · 5日共讀夏令營</b>
          <span>原圖 D.png 1:1 重製 · 1030×450</span>
          <a class="dl" href="img/bn-01-literacy-camp.png" download="bn-01-literacy-camp.png">⬇ 下載 PNG</a>
        </figcaption>
      </figure>
      <figure class="card">
        <a class="shot" href="img/bn-02-english-camp.png" target="_blank" rel="noreferrer">
          <img src="img/bn-02-english-camp.png" alt="在家也能開口說 · 7日親子英語營" loading="lazy">
        </a>
        <figcaption>
          <b>在家也能開口說 · 7日親子英語營</b>
          <span>換文案 · 同風格 · 1030×450</span>
          <a class="dl" href="img/bn-02-english-camp.png" download="bn-02-english-camp.png">⬇ 下載 PNG</a>
        </figcaption>
      </figure>
      <figure class="card">
        <a class="shot" href="img/bn-03-math-camp.png" target="_blank" rel="noreferrer">
          <img src="img/bn-03-math-camp.png" alt="玩遊戲也能學數學 · 10日邏輯思維營" loading="lazy">
        </a>
        <figcaption>
          <b>玩遊戲也能學數學 · 10日邏輯思維營</b>
          <span>換文案＋綠色主題 · 1030×450</span>
          <a class="dl" href="img/bn-03-math-camp.png" download="bn-03-math-camp.png">⬇ 下載 PNG</a>
        </figcaption>
      </figure>
  </div>
  <footer>
    Rose Rose · 兒童課程廣告視覺　｜　線上：<a href="https://henrywhuang.github.io/rose-rose-ad-visual-catalog/bn/">https://henrywhuang.github.io/rose-rose-ad-visual-catalog/bn/</a><br>
    設計規範見 repo <code>bn_kit/兒童課程Banner設計規範.md</code>
  </footer>
</div>
</body>
</html>
